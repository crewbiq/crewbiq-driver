name: PWA Auth Contract

on:
  pull_request:
    paths:
      - core.js
      - core-runtime.js
      - offline-sync-queue.js
      - restore-hotfix.js
      - settings-hotfix.js
      - owner-snapshot-hotfix.js
      - load-order-hotfix.js
      - deduction-policy-hotfix.js
      - deduction-period-hotfix.js
      - settlement-week-hotfix.js
      - deduction-trip-resolution.js
      - accounting-action-guard.js
      - deduction-policy-ui-fix.js
      - ocr-hotfix.js
      - ocr-invoice-review.js
      - ocr-item-alias-hotfix.js
      - ocr-service-invoice-review.js
      - service-invoice-legacy-upgrade.js
      - dispute-tombstone-hotfix.js
      - sw.js
      - tests/orchestrator_transport.test.mjs
      - tests/offline_sync_queue.test.mjs
      - tests/offline_sync_terminal_409.test.mjs
      - tests/full_restore_transport.test.mjs
      - tests/settings_restore_transport.test.mjs
      - tests/owner_snapshot_deletion.test.mjs
      - tests/load_date_ordering.test.mjs
      - tests/effective_deduction_policy.test.mjs
      - tests/deduction_trip_resolution.test.mjs
      - tests/accounting_action_guard.test.mjs
      - tests/ocr_authenticated_transport.test.mjs
      - tests/ocr_invoice_review.test.mjs
      - tests/ocr_defd_alias.test.mjs
      - tests/ocr_service_invoice_review.test.mjs
      - tests/service_invoice_legacy_upgrade.test.mjs
      - tests/dispute_tombstone_hotfix.test.mjs
      - .github/workflows/pwa-auth-contract.yml
  push:
    branches:
      - main
    paths:
      - core.js
      - core-runtime.js
      - offline-sync-queue.js
      - restore-hotfix.js
      - settings-hotfix.js
      - owner-snapshot-hotfix.js
      - load-order-hotfix.js
      - deduction-policy-hotfix.js
      - deduction-period-hotfix.js
      - settlement-week-hotfix.js
      - deduction-trip-resolution.js
      - accounting-action-guard.js
      - deduction-policy-ui-fix.js
      - ocr-hotfix.js
      - ocr-invoice-review.js
      - ocr-item-alias-hotfix.js
      - ocr-service-invoice-review.js
      - service-invoice-legacy-upgrade.js
      - dispute-tombstone-hotfix.js
      - sw.js
      - tests/orchestrator_transport.test.mjs
      - tests/offline_sync_queue.test.mjs
      - tests/offline_sync_terminal_409.test.mjs
      - tests/full_restore_transport.test.mjs
      - tests/settings_restore_transport.test.mjs
      - tests/owner_snapshot_deletion.test.mjs
      - tests/load_date_ordering.test.mjs
      - tests/effective_deduction_policy.test.mjs
      - tests/deduction_trip_resolution.test.mjs
      - tests/accounting_action_guard.test.mjs
      - tests/ocr_authenticated_transport.test.mjs
      - tests/ocr_invoice_review.test.mjs
      - tests/ocr_defd_alias.test.mjs
      - tests/ocr_service_invoice_review.test.mjs
      - tests/service_invoice_legacy_upgrade.test.mjs
      - tests/dispute_tombstone_hotfix.test.mjs
      - .github/workflows/pwa-auth-contract.yml

permissions:
  contents: read

jobs:
  orchestrator-transport:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run existing authenticated runtime contract
        run: |
          sed "s#../core.js#../core-runtime.js#" tests/orchestrator_transport.test.mjs > tests/.runtime-contract.mjs
          node tests/.runtime-contract.mjs

      - name: Run durable offline queue contract
        run: node tests/offline_sync_queue.test.mjs

      - name: Run terminal 409 queue contract
        run: node tests/offline_sync_terminal_409.test.mjs

      - name: Run complete restore and expense contract
        run: node tests/full_restore_transport.test.mjs

      - name: Run Settings snapshot contract
        run: node tests/settings_restore_transport.test.mjs

      - name: Run owner snapshot deletion contract
        run: node tests/owner_snapshot_deletion.test.mjs

      - name: Run load date ordering contract
        run: node tests/load_date_ordering.test.mjs

      - name: Run effective truck deduction policy contract
        run: node tests/effective_deduction_policy.test.mjs

      - name: Run configured settlement-week deduction contract
        run: node tests/deduction_trip_resolution.test.mjs

      - name: Run skipped-week accounting guard contract
        run: node tests/accounting_action_guard.test.mjs

      - name: Run authenticated OCR transport contract
        run: node tests/ocr_authenticated_transport.test.mjs

      - name: Run multi-driver fuel invoice review contract
        run: node tests/ocr_invoice_review.test.mjs

      - name: Run TBC DEFD alias regression contract
        run: node tests/ocr_defd_alias.test.mjs

      - name: Run segmented service invoice review contract
        run: node tests/ocr_service_invoice_review.test.mjs

      - name: Run legacy service invoice upgrade contract
        run: node tests/service_invoice_legacy_upgrade.test.mjs

      - name: Run durable dispute deletion contract
        run: node tests/dispute_tombstone_hotfix.test.mjs

      - name: Verify loader and service-worker cache rotation
        run: |
          grep -q "core-runtime.js" core.js
          grep -q "offline-sync-queue.js?v=20260716-offline-sync-v2" core.js
          grep -q "restore-hotfix.js" core.js
          grep -q "settings-hotfix.js" core.js
          grep -q "owner-snapshot-hotfix.js?v=20260713-owner-snapshot-v2" core.js
          grep -q "load-order-hotfix.js?v=20260718-load-pencil-v3" core.js
          grep -q "deduction-policy-hotfix.js" core.js
          grep -q "deduction-period-hotfix.js?v=20260717-deduction-period-v1" core.js
          grep -q "settlement-week-hotfix.js?v=20260717-settlement-week-v1" core.js
          grep -q "deduction-trip-resolution.js?v=20260717-deduction-trip-v2" core.js
          grep -q "accounting-action-guard.js?v=20260717-accounting-guard-v1" core.js
          grep -q "deduction-policy-ui-fix.js" core.js
          grep -q "ocr-hotfix.js" core.js
          grep -q "ocr-invoice-review.js" core.js
          grep -q "ocr-item-alias-hotfix.js" core.js
          grep -q "ocr-service-invoice-review.js" core.js
          grep -q "service-invoice-legacy-upgrade.js" core.js
          grep -q "dispute-tombstone-hotfix.js?v=20260716-dispute-delete-v1" core.js
          grep -q "crewbiq-driver-v79" sw.js
          grep -q "offline-sync-queue.js" sw.js
          grep -q "owner-snapshot-hotfix.js" sw.js
          grep -q "load-order-hotfix.js" sw.js
          grep -q "deduction-period-hotfix.js" sw.js
          grep -q "settlement-week-hotfix.js" sw.js
          grep -q "deduction-trip-resolution.js" sw.js
          grep -q "accounting-action-guard.js" sw.js
          grep -q "ocr-service-invoice-review.js" sw.js
          grep -q "service-invoice-legacy-upgrade.js" sw.js
          grep -q "dispute-tombstone-hotfix.js" sw.js
          grep -q "railway.app" sw.js
