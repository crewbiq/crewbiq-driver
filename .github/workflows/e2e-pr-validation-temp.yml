name: Temporary E2E PR Validation

on:
  pull_request:
    paths:
      - 'tests/e2e/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/e2e-harness-manual.yml'
      - '.github/workflows/e2e-pr-validation-temp.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python test dependency
        run: python -m pip install pytest

      - name: Run E2E tooling contracts
        run: npm run test:e2e:tooling

      - name: Parse and enumerate all Playwright staging scenarios
        run: |
          node --check tests/e2e/staging-tenant-isolation.spec.mjs
          node --check tests/e2e/support/staging-api.mjs
          node --check tests/e2e/support/staging-prerequisites.mjs
          E2E_AUTHENTICATED_RUN=1 npx playwright test \
            tests/e2e/staging-auth-restore.spec.mjs \
            tests/e2e/staging-fleet-integrity.spec.mjs \
            tests/e2e/staging-tenant-isolation.spec.mjs \
            --list

      - name: Run focused Python contract
        run: python -m pytest -q tests/test_fleet_edit_contract.py

      - name: Check whitespace
        run: git diff --check origin/${{ github.base_ref }}...HEAD
